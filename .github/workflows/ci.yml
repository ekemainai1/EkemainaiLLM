# Main CI/CD Pipeline - Combines all checks

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  PYTHON_VERSION: '3.12'
  PIP_NO_CACHE_DIR: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Job 1: Tests
  # ==========================================
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov
          pip install -q -r requirements.txt
      
      - name: Run unit tests
        run: |
          cd ${{ github.workspace }}
          python -m pytest tests/test_merge_datasets.py tests/test_add_reasoning.py tests/test_add_reasoning_v2.py tests/test_train.py -v --tb=short

  # ==========================================
  # Job 2: Dataset Validation
  # ==========================================
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Check if data files exist
        run: |
          cd ${{ github.workspace }}
          echo "Checking data directory..."
          ls -la data/ 2>/dev/null || echo "No data directory"
          ls -la data/*.jsonl 2>/dev/null || echo "No JSONL files found"

  # ==========================================
  # Job 3: Code Quality
  # ==========================================
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install tools
        run: pip install -q ruff black
      
      - name: Check formatting
        run: |
          black --check scripts/ tests/ || true
      
      - name: Run linter
        run: |
          ruff check scripts/ tests/ || true
      
      - name: Check syntax
        run: |
          python -m py_compile scripts/*.py

  # ==========================================
  # Job 4: Full Dataset Pipeline (on main)
  # ==========================================
  pipeline:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -q datasets tqdm
      
      - name: Run dataset pipeline
        run: |
          cd ${{ github.workspace }}
          python scripts/merge_datasets.py --all --no-dedup || true
          python scripts/add_reasoning_v2.py \
            --input data/combined_final.jsonl \
            --output data/cot_final.jsonl || true
      
      - name: Summary
        run: |
          cd ${{ github.workspace }}
          for f in data/*.jsonl; do
            if [ -f "$f" ]; then
              echo "- $f: $(wc -l < $f) samples"
            fi
          done
