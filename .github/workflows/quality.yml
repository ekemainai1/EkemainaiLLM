name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install quality tools
      run: pip install -q ruff black isort
    
    - name: Check code formatting (black)
      run: black --check scripts/ tests/ || true
    
    - name: Check import order (isort)
      run: isort --check-only --diff scripts/ tests/ || true
    
    - name: Run linter (ruff)
      run: ruff check scripts/ tests/ || true
    
    - name: Check Python syntax
      run: |
        python -m py_compile scripts/*.py
        python -m py_compile tests/*.py
    
    - name: Check for security issues (bandit)
      run: pip install -q bandit && bandit -r scripts/ tests/ || echo " bandit not critical"