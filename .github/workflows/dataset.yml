name: Dataset Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Report available files
      run: |
        cd ${{ github.workspace }}
        echo "Files in data/:"
        ls -la data/*.jsonl 2>/dev/null || echo "No JSONL files found"
    
    - name: Check dataset sizes
      run: |
        cd ${{ github.workspace }}
        python3 -c "
        import os
        from pathlib import Path
        
        data_files = list(Path('data').glob('*.jsonl'))
        total = 0
        
        for f in sorted(data_files):
            size = f.stat().st_size / (1024*1024)
            count = sum(1 for _ in open(f))
            total += count
            print(f'  {f.name}: {count:,} samples ({size:.1f} MB)')
        
        print(f'\nTotal: {total:,} samples across {len(data_files)} files')
        "
    
    - name: Verify dataset schema
      run: |
        cd ${{ github.workspace }}
        python3 -c "
        import json
        import os

        dataset_path = 'data/combined_final.jsonl'
        
        if not os.path.exists(dataset_path):
            print('SKIP: Dataset file not found (data/combined_final.jsonl)')
            print('This is expected if dataset has not been generated yet.')
            exit(0)
        
        required_fields = ['instruction', 'input', 'output']
        
        with open(dataset_path) as f:
            for i, line in enumerate(f):
                if i >= 100:
                    break
                sample = json.loads(line)
                for field in required_fields:
                    if field not in sample:
                        print(f'WARNING: Missing {field} in sample {i}')
        
        print('Schema validation complete: OK')
        "
    
    - name: Report JSONL validity
      run: |
        cd ${{ github.workspace }}
        for f in data/*.jsonl; do
          if [ -f "$f" ]; then
            count=$(wc -l < "$f")
            valid=$(python3 -c "import json; open('$f').close()" 2>/dev/null && echo "valid" || echo "INVALID")
            echo "$f: $count lines, $valid"
          fi
        done || echo "No JSONL files to check"