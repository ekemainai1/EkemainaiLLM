name: Full Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Base model'
        required: false
        default: 'mistralai/Mistral-7B-Instruct-v0.3'
      dataset_action:
        description: 'Dataset action'
        required: false
        type: choice
        default: 'all'
        options:
          - merge
          - add_cot
          - add_reasoning
          - all
          - skip
      epochs:
        description: 'Training epochs'
        required: false
        default: '3'
      batch_size:
        description: 'Batch size'
        required: false
        default: '4'
      provision_infra:
        description: 'Provision GPU infrastructure'
        required: false
        type: boolean
        default: true
      run_tests:
        description: 'Run tests first'
        required: false
        type: boolean
        default: true
      skip_training:
        description: 'Skip training (provision only)'
        required: false
        type: boolean
        default: false
      manual_gpu_only:
        description: 'Skip infra and train on manual GPU host'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event.inputs.run_tests == 'true' }}
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    outputs:
      status: ${{ job.status }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -q pytest pytest-cov
        pip install -q -r requirements.txt
    
    - name: Run unit tests
      run: |
        cd ${{ github.workspace }}
        python -m pytest tests/test_merge_datasets.py tests/test_add_reasoning.py tests/test_add_reasoning_v2.py tests/test_train.py -v --tb=short
    
    - name: Lint
      run: |
        pip install -q ruff
        ruff check scripts/ tests/ || true

  dataset:
    name: Generate Dataset
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event.inputs.run_tests == 'true' && needs.test.result == 'success' }}
    env:
      PYTHONPATH: ${{ github.workspace }}
    outputs:
      dataset_path: ${{ steps.pipeline.outputs.dataset_path }}
      dataset_count: ${{ steps.pipeline.outputs.dataset_count }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: pip install -q datasets tqdm
    
    - name: Run dataset pipeline
      id: pipeline
      run: |
        cd ${{ github.workspace }}
        
        if [ "${{ github.event.inputs.dataset_action }}" == "skip" ]; then
          echo "Skipping dataset generation"
          echo "dataset_path=data/cot_final.jsonl" >> $GITHUB_OUTPUT
          echo "dataset_count=256542" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        python scripts/merge_datasets.py --all --no-dedup || true
        
        if [ "${{ github.event.inputs.dataset_action }}" == "merge" ]; then
          echo "dataset_path=data/combined_final.jsonl" >> $GITHUB_OUTPUT
          echo "dataset_count=$(wc -l < data/combined_final.jsonl)" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        python scripts/add_reasoning_v2.py \
          --input data/combined_final.jsonl \
          --output data/cot_final.jsonl || true
        
        if [ "${{ github.event.inputs.dataset_action }}" == "add_cot" ]; then
          echo "dataset_path=data/cot_final.jsonl" >> $GITHUB_OUTPUT
          echo "dataset_count=$(wc -l < data/cot_final.jsonl)" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        python scripts/add_reasoning.py \
          --input data/combined_final.jsonl \
          --output data/reasoning_final.jsonl || true
        
        echo "dataset_path=data/cot_final.jsonl" >> $GITHUB_OUTPUT
        echo "dataset_count=$(wc -l < data/cot_final.jsonl)" >> $GITHUB_OUTPUT
    
    - name: Upload datasets
      uses: actions/upload-artifact@v4
      with:
        name: datasets
        path: data/*.jsonl
        retention-days: 7

  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [test, dataset]
    if: ${{ github.event.inputs.manual_gpu_only != 'true' && github.event.inputs.provision_infra == 'true' && (github.event.inputs.run_tests != 'true' || needs.test.result == 'success') }}
    environment: infrastructure
    permissions:
      contents: write
    env:
      TF_VERSION: '1.7.0'
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
      SSH_KEY_FINGERPRINT: ${{ secrets.SSH_KEY_FINGERPRINT }}
    outputs:
      droplet_ip: ${{ steps.outputs.outputs.droplet_ip }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Create terraform.tfvars
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        do_token = "$DO_TOKEN"
        ssh_key_fingerprint = "$SSH_KEY_FINGERPRINT"
        preferred_regions = ["atl1", "nyc1", "sfo2", "ams3"]
        EOF
    
    - name: Terraform Init
      run: cd terraform && terraform init -upgrade
    
    - name: Terraform Apply
      run: cd terraform && terraform apply -var-file=terraform.tfvars -auto-approve
    
    - name: Get Outputs
      id: outputs
      run: |
        cd terraform
        echo "droplet_ip=$(terraform output -raw droplet_ip)" >> $GITHUB_OUTPUT

    - name: Upload Terraform state
      uses: actions/upload-artifact@v4
      with:
        name: terraform-state
        path: terraform/terraform.tfstate
        retention-days: 30

  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: [dataset, provision]
    if: ${{ github.event.inputs.skip_training != 'true' && github.event.inputs.manual_gpu_only != 'true' }}
    env:
      PYTHONPATH: ${{ github.workspace }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      DROPLET_IP: ${{ needs.provision.outputs.droplet_ip }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Download datasets
      uses: actions/download-artifact@v4
      with:
        name: datasets
        path: data/
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -q torch --index-url https://download.pytorch.org/whl/rocm6.1
        pip install -q transformers accelerate peft datasets sentencepiece
    
    - name: Run training
      run: |
        cd ${{ github.workspace }}
        python scripts/train.py \
          --model "${{ github.event.inputs.model }}" \
          --dataset "${{ needs.dataset.outputs.dataset_path }}" \
          --output ./fine-tuned-model \
          --epochs ${{ github.event.inputs.epochs }} \
          --batch-size ${{ github.event.inputs.batch_size }} \
          --prompt-style cot
    
    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: fine-tuned-model
        path: fine-tuned-model/
        retention-days: 30
    
    - name: Upload training logs
      uses: actions/upload-artifact@v4
      with:
        name: training-logs
        path: |
          fine-tuned-model/trainer_state.json
          *.log
        retention-days: 30

  train_manual:
    name: Train Model (Manual GPU)
    runs-on: ubuntu-latest
    needs: [dataset]
    if: ${{ github.event.inputs.skip_training != 'true' && github.event.inputs.manual_gpu_only == 'true' }}
    env:
      PYTHONPATH: ${{ github.workspace }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
      GPU_HOST: ${{ secrets.GPU_HOST }}
      GPU_USER: ${{ secrets.GPU_USER }}
      GPU_SSH_PORT: ${{ secrets.GPU_SSH_PORT }}
      GPU_SSH_PASSPHRASE: ${{ secrets.GPU_SSH_PASSPHRASE }}
      DATASET_PATH: ${{ needs.dataset.outputs.dataset_path }}

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Validate manual GPU secrets
      run: |
        if [ -z "$GPU_HOST" ]; then
          echo "Missing required secret: GPU_HOST"
          exit 1
        fi
        if [ -z "${{ secrets.GPU_SSH_PRIVATE_KEY }}" ]; then
          echo "Missing required secret: GPU_SSH_PRIVATE_KEY"
          exit 1
        fi
        if [ -z "$DO_TOKEN" ]; then
          echo "Missing required secret: DO_TOKEN (needed to validate manual droplet type/region)"
          exit 1
        fi

    - name: Verify manual droplet is MI300X in atl1
      run: |
        set -e
        response=$(curl -s -H "Authorization: Bearer $DO_TOKEN" "https://api.digitalocean.com/v2/droplets?per_page=200")
        droplet=$(echo "$response" | jq -c --arg ip "$GPU_HOST" '.droplets[] | select(any(.networks.v4[]?; .ip_address == $ip))' | head -n1)
        if [ -z "$droplet" ]; then
          echo "Could not find droplet with public IP $GPU_HOST in this DigitalOcean account/token."
          exit 1
        fi

        size=$(echo "$droplet" | jq -r '.size_slug // .size.slug // ""')
        region=$(echo "$droplet" | jq -r '.region.slug // ""')

        echo "Detected manual droplet: size=$size region=$region"
        case "$size" in
          gpu-mi300x1-192gb* ) valid_size=true ;;
          * ) valid_size=false ;;
        esac

        if [ "$valid_size" != "true" ] || [ "$region" != "atl1" ]; then
          echo "Manual mode requires size starting with gpu-mi300x1-192gb and region=atl1."
          exit 1
        fi

    - name: Download datasets
      uses: actions/download-artifact@v4
      with:
        name: datasets
        path: data/

    - name: Setup SSH agent (supports encrypted & unencrypted keys)
      env:
        GPU_SSH_PRIVATE_KEY: ${{ secrets.GPU_SSH_PRIVATE_KEY }}
      run: |
        set -e
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        printf '%s\n' "$GPU_SSH_PRIVATE_KEY" > ~/.ssh/id_ci_raw
        chmod 600 ~/.ssh/id_ci_raw

        # Normalize CRLF and literal \n formats
        python3 -c "from pathlib import Path; p=Path.home()/'.ssh'/'id_ci_raw'; txt=p.read_text().replace('\\r',''); txt=txt.replace('\\\\n','\\n') if '\\\\n' in txt else txt; txt = txt if txt.endswith('\\n') else txt+'\\n'; p.write_text(txt)"

        eval "$(ssh-agent -s)"
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

        if [ -n "$GPU_SSH_PASSPHRASE" ]; then
          # Remove passphrase non-interactively for CI use
          ssh-keygen -p -P "$GPU_SSH_PASSPHRASE" -N "" -f ~/.ssh/id_ci_raw > /dev/null
        fi
        ssh-add ~/.ssh/id_ci_raw

        ssh-add -l

        PORT="${GPU_SSH_PORT:-22}"
        ssh-keyscan -p "$PORT" "$GPU_HOST" >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Prepare remote workspace
      run: |
        PORT="${GPU_SSH_PORT:-22}"
        USERNAME="${GPU_USER:-root}"
        ssh -p "$PORT" "$USERNAME@$GPU_HOST" "if [ ! -d ~/EkemainaiLLM ]; then git clone https://github.com/${{ github.repository }}.git ~/EkemainaiLLM; else cd ~/EkemainaiLLM && git pull; fi"

    - name: Upload selected dataset to GPU host
      run: |
        PORT="${GPU_SSH_PORT:-22}"
        USERNAME="${GPU_USER:-root}"
        mkdir -p "$(dirname "$DATASET_PATH")"
        if [ ! -f "$DATASET_PATH" ]; then
          echo "Dataset not found: $DATASET_PATH"
          ls -la data || true
          exit 1
        fi
        ssh -p "$PORT" "$USERNAME@$GPU_HOST" "mkdir -p ~/EkemainaiLLM/data"
        scp -P "$PORT" "$DATASET_PATH" "$USERNAME@$GPU_HOST:~/EkemainaiLLM/$DATASET_PATH"

    - name: Run training on manual GPU host
      run: |
        PORT="${GPU_SSH_PORT:-22}"
        USERNAME="${GPU_USER:-root}"
        ssh -p "$PORT" "$USERNAME@$GPU_HOST" "bash -lc '
          set -euxo pipefail
          cd ~/EkemainaiLLM

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y python3.12-venv python3-venv python3-pip || sudo apt-get install -y python3-venv python3-pip
          else
            apt-get update
            apt-get install -y python3.12-venv python3-venv python3-pip || apt-get install -y python3-venv python3-pip
          fi

          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

          python scripts/train.py \
            --model "${{ github.event.inputs.model }}" \
            --dataset "$DATASET_PATH" \
            --output ./fine-tuned-model \
            --epochs ${{ github.event.inputs.epochs }} \
            --batch-size ${{ github.event.inputs.batch_size }} \
            --prompt-style cot
        '"

    - name: Download trained model artifacts
      run: |
        PORT="${GPU_SSH_PORT:-22}"
        USERNAME="${GPU_USER:-root}"
        ssh -p "$PORT" "$USERNAME@$GPU_HOST" "cd ~/EkemainaiLLM && tar -czf /tmp/fine-tuned-model.tar.gz fine-tuned-model || true"
        scp -P "$PORT" "$USERNAME@$GPU_HOST:/tmp/fine-tuned-model.tar.gz" ./fine-tuned-model.tar.gz
        mkdir -p fine-tuned-model
        tar -xzf ./fine-tuned-model.tar.gz

    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: fine-tuned-model
        path: fine-tuned-model/
        retention-days: 30

  summary:
    name: Deployment Summary
    needs: [test, dataset, provision, train, train_manual]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Summary
      run: |
        echo "## Deployment Pipeline Complete"
        echo ""
        echo "| Stage | Status |"
        echo "|-------|--------|"
        echo "| Tests | ${{ needs.test.result }} |"
        echo "| Dataset | ${{ needs.dataset.result }} |"
        echo "| Infrastructure | ${{ needs.provision.result }} |"
        echo "| Training (auto) | ${{ needs.train.result }} |"
        echo "| Training (manual) | ${{ needs.train_manual.result }} |"
        echo ""
        
        if [ "${{ needs.provision.result }}" == "success" ]; then
          echo "### GPU Instance"
          echo "IP: ${{ needs.provision.outputs.droplet_ip }}"
        fi
        
        if [ "${{ needs.train.result }}" == "success" ] || [ "${{ needs.train_manual.result }}" == "success" ]; then
          echo "### Model Trained"
          echo "Dataset: ${{ needs.dataset.outputs.dataset_path }}"
          echo "Samples: ${{ needs.dataset.outputs.dataset_count }}"
        fi
